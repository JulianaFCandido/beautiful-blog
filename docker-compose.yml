version: '3.9'
services:
  db:
    image: 'postgres:latest'
    volumes:
      - postgres:/var/lib/postgresql/data
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: beautiful_blog_development
    ports:
      - 5432:5432

  rails:
    tty: true
    stdin_open: true
    build: ./
    container_name: rails
    ports:
      - 3000:3000
    volumes:
      - .:/docker/app
    depends_on:
      - db

  adminer:
    image: adminer
    container_name: adminer
    ports:
      - 8080:8080
    depends_on:
      - db

volumes:
  postgres:
